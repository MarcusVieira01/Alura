<!DOCTYPE html>
<html lang="pt-br">
  <head>
      <meta charset="UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="./style.css">
      <script src="./script.js"></script>
      <title>Imersão Dev - Aula 05</title>
  </head>
  <body>
      <div class="container">
          <h1 class="page-title">Aluraflix</h1>

          <img src="https://www.alura.com.br/assets/img/imersoes/dev-2021/logo-imersao-aluraflix.svg" class="page-logo" alt="">
          <p class="page-subtitle">Qual seu filme favorito?</p>

          <div class="form-wrapper">
            <input type="text" id="filmeInput" name="filme" placeholder="Insira endereço de imagem" size=25>
            <input type="text" id="nomeInput" name="nome" placeholder="Insira o nome do filme" size="25">
            <button onClick="adicionarFilme()" id="insere">Adicionar Filme</button>
            <button onClick="apagaFilme()" id="apaga">Apagar Filme</button>
          </div>
        </div>

        <div id="listaFilmes"></div>
        <div id="nome"></div>

        <a href="https://alura.com.br/" target="_blank">
          <img src="https://www.alura.com.br/assets/img/home/alura-logo.svg" alt="" class="alura-logo">
        </a>
  </body>
</html>
